services:
  easy:
    build: .
    container_name: easy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - easy_data:/var/lib/easy
    environment:
      - EASY_DB=/var/lib/easy/easy.db
      - EASY_INTERVAL=10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  homepage:
    build: ./homepage
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  easy_data:
    driver: local
