services:
  ntp-dashboard:
    image: ntp-dashboard:latest
    build: .
    container_name: ntp-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ntp_data:/var/lib/ntp
    environment:
      - NTP_DB=/var/lib/ntp/ntp.db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/ntp/status"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ntp_data:
    driver: local
